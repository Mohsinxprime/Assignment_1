<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
</head>
<body>
<center>
    <h1>Create an Account</h1>
    <p>Please fill in this form to create an account.</p
    

    <form >
 <label for="username">Username:</label><br>
<input type="text" id="username" name="username" required><br><br>

 <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>
 <label for="password">Password:</label><br>
<input type="password" id="password" name="password" required><br><br>

 <p>Account type:</p>
 <input type="radio" id="user" name="account_type" value="user" checked>
    <label for="user">User</label><br>
     <input type="radio" id="admin" name="account_type" value="admin">
    <label for="admin">Admin</label><br><br>

        <input type="checkbox" id="terms" name="terms" required>
     <label >I agree to the <a href="#">Terms and Conditions</a></label><br><br>

        <button type="submit">Sign Up</button>

        <button type="reset">Reset Form</button>
    

        </form>
</center>

</body>
</body>
</html>
